<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="512" height="512">
  <!-- Background transparent for Android Adaptive Icon -->
  <rect width="24" height="24" fill="none"/>
  
  <!-- Main Console Body (Indigo) - Shaved 1 unit off the bottom -->
  <rect x="1" y="5" width="22" height="13" rx="4" fill="#4B0082"/>
  
  <!-- Screen (Dark Grey) - Now perfectly centered vertically -->
  <rect x="6" y="7" width="12" height="9" rx="1" fill="#212121"/>
  
  <!-- D-Pad (White) -->
  <path d="M 2 11 h 1 v -1 h 1 v 1 h 1 v 1 h -1 v 1 h -1 v -1 h -1 z" fill="#FFFFFF"/>
  
  <!-- A / B Buttons (White) - Nudged up slightly to match the new center axis -->
  <circle cx="19.5" cy="12.25" r="0.8" fill="#FFFFFF"/>
  <circle cx="21.5" cy="10.75" r="0.8" fill="#FFFFFF"/>
  
  <!-- Fast Forward Symbol inside screen (Neon Green) -->
  <path d="M 9.5 9.5 L 12.5 11.5 L 9.5 13.5 Z" fill="#00FF00"/>
  <path d="M 12.5 9.5 L 15.5 11.5 L 12.5 13.5 Z" fill="#00FF00"/>
</svg>
